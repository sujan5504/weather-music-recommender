<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherTune</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" href="/css/styles.css">
</head>
<body>
<main class="container hero">
    <h1>WeatherTune</h1>
    <p>Get Spotify recommendations based on your real-time weather.</p>

    <div th:if="${isAuthenticated}">
        <p>Signed in as <strong th:text="${principalName}">user</strong>.</p>
        <a class="btn" th:href="@{/dashboard}">Open dashboard</a>
        <form th:action="@{/logout}" method="post" class="inline-form">
            <button class="btn secondary" type="submit">Logout</button>
        </form>
    </div>

    <div th:unless="${isAuthenticated}">
        <a class="btn" th:href="@{/oauth2/authorization/spotify}">Login with Spotify</a>
    </div>
</main>
</body>
</html>
