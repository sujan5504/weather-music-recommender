spring.application.name=weathertune
server.port=${SERVER_PORT:8081}

# Load local .env when present (project root or backend/) for local development.
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]

# Default to H2 for local development.
spring.profiles.default=h2

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update

spring.thymeleaf.cache=false

app.weather.base-url=https://api.openweathermap.org/data/2.5
app.weather.api-key=${OPENWEATHER_API_KEY:}
app.weather.units=metric

app.spotify.base-url=https://api.spotify.com/v1

# OAuth2 Configuration - Optional, only needed for authenticated endpoints
spring.security.oauth2.client.registration.spotify.client-id=${SPOTIFY_CLIENT_ID:dummy}
spring.security.oauth2.client.registration.spotify.client-secret=${SPOTIFY_CLIENT_SECRET:dummy}
spring.security.oauth2.client.registration.spotify.client-name=Spotify
spring.security.oauth2.client.registration.spotify.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.spotify.scope=user-read-email,user-read-private
spring.security.oauth2.client.registration.spotify.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

spring.security.oauth2.client.provider.spotify.authorization-uri=https://accounts.spotify.com/authorize
spring.security.oauth2.client.provider.spotify.token-uri=https://accounts.spotify.com/api/token
spring.security.oauth2.client.provider.spotify.user-info-uri=https://api.spotify.com/v1/me
spring.security.oauth2.client.provider.spotify.user-name-attribute=id

